  <g transform="translate(28, 22)">
    <rect x="2" y="14" width="4" height="10" fill="#ffffff" opacity="0.95"/>
    <rect x="8" y="10" width="4" height="14" fill="#ffffff" opacity="0.95"/>
    <rect x="14" y="6" width="4" height="18" fill="#ffffff" opacity="0.95"/>
    <line x1="10" y1="4" x2="10" y2="10" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="10" y1="4" x2="22" y2="1" stroke="#ffffff" stroke-width="1.5"/>
